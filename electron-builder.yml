appId: com.alshibani.accounting
productName: "نظام المحاسبة - الشيباني"
directories:
  output: dist-desktop
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "نظام المحاسبة - الشيباني"
  installerHeaderIcon: ""
